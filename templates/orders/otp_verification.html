{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="glass-card p-8 text-center">
        <h1 class="text-2xl font-bold mb-4 uppercase">Verificar Código</h1>
        <p class="text-gray-400 mb-6">Insira o código de 6 dígitos enviado para o seu telemóvel.</p>

        <form method="POST" action="{% url 'verify_otp' order.id %}">
            {% csrf_token %}
            <input type="text" name="otp_code" maxlength="6" required 
                   placeholder="000000"
                   class="w-full bg-white/5 border border-white/10 rounded p-4 text-center text-2xl tracking-[1em] focus:border-cyan-400 text-white mb-6">
            
            <button type="submit" class="w-full bg-cyan-400 text-black font-bold py-4 rounded hover:bg-cyan-300 transition uppercase">
                Verificar Pagamento
            </button>
        </form>
    </div>
</div>
{% endblock %}
